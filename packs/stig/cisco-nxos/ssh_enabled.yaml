id: cisco.nxos.stig.v-220300
title: "The NX-OS switch must enable the SSH feature for remote administration."
severity: medium
vendors: [cisco-nx-os]
description: |
  STIG requires SSH for all management access; the ssh feature must be explicitly enabled.
rationale: |
  Sourced from the DISA Cisco NX-OS Switch NDM STIG. CAT II finding.
  See V-220300 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-220300 on the device's POA&M.
references:
  stig: ["V-220300"]
  cci:
    - "CCI-001941"
query:
  path: "$.features[*]"
  in: ["ssh"]
on_fail:
  message: "Cisco NX-OS STIG V-220300 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220300.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-nxos/fixtures/feature_ssh.compliant.txt
  negative: ../../cis/cisco-nxos/fixtures/feature_ssh.violating.txt
