id: cisco.nxos.stig.v-220304
title: "The NX-OS switch must display the DoD-approved logon banner before authentication."
severity: medium
vendors: [cisco-nx-os]
description: |
  A pre-login MOTD banner must assert monitoring consent.
rationale: |
  Sourced from the DISA Cisco NX-OS Switch NDM STIG. CAT II finding.
  See V-220304 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-220304 on the device's POA&M.
references:
  stig: ["V-220304"]
  cci:
    - "CCI-000048"
query:
  path: "$.banners.motd"
  matches: "."
on_fail:
  message: "Cisco NX-OS STIG V-220304 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220304.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-nxos/fixtures/banner.compliant.txt
  negative: ../../cis/cisco-nxos/fixtures/banner.violating.txt
