id: cisco.nxos.stig.v-220307
title: "The NX-OS switch must not use well-known default SNMP community strings."
severity: high
vendors: [cisco-nx-os]
description: |
  Default communities effectively grant anonymous read/write on UDP/161.
rationale: |
  Sourced from the DISA Cisco NX-OS Switch NDM STIG. CAT I finding.
  See V-220307 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category I; auditors will
  cite V-220307 on the device's POA&M.
references:
  stig: ["V-220307"]
  cci:
    - "CCI-001967"
query:
  path: "$.snmp.communities[*].name"
  in: ["public", "private", "cisco", "admin"]
  not: true
on_fail:
  message: "Cisco NX-OS STIG V-220307 (I) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220307.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-nxos/fixtures/snmp_default.compliant.txt
  negative: ../../cis/cisco-nxos/fixtures/snmp_default.violating.txt
