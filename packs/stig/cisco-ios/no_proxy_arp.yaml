id: cisco.ios.stig.v-215823.no_proxy_arp
title: "The Cisco router must disable IP proxy-ARP on every interface."
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  Proxy-ARP enables MAC-spoofing attacks and breaks the host-routing model assumed by STIG-baselined networks.
rationale: |
  Sourced from the DISA Cisco IOS XE Router NDM STIG. CAT II finding.
  See V-215823 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-215823 on the device's POA&M.
references:
  stig: ["V-215823"]
  cci:
    - "CCI-000382"
query:
  path: "$.hardening.ip_proxy_arp"
  equals: false
on_fail:
  message: "Cisco IOS STIG V-215823 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-215823.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/no_proxy_arp.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/no_proxy_arp.violating.txt
