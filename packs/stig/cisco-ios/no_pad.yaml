id: cisco.ios.stig.v-215823.no_pad
title: "The Cisco router must disable the X.25 PAD service."
severity: low
vendors: [cisco-ios, cisco-ios-xe]
description: |
  service pad is legacy X.25 and a known attack-surface increase with no operational value on modern networks.
rationale: |
  Sourced from the DISA Cisco IOS XE Router NDM STIG. CAT III finding.
  See V-215823 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category III; auditors will
  cite V-215823 on the device's POA&M.
references:
  stig: ["V-215823"]
  cci:
    - "CCI-000382"
query:
  path: "$.hardening.service_pad"
  equals: false
on_fail:
  message: "Cisco IOS STIG V-215823 (III) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-215823.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/no_pad.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/no_pad.violating.txt
