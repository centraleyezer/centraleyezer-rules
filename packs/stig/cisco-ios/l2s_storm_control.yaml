id: cisco.ios.stig.v-220636
title: "The Cisco switch must enable Storm Control on every host-facing access port."
severity: low
vendors: [cisco-ios, cisco-ios-xe]
description: |
  Storm Control rate-limits broadcast / multicast / unicast bursts that would otherwise saturate the access VLAN.
rationale: |
  Sourced from the DISA Cisco IOS XE Switch L2S STIG (CISC-L2-* control family).
  CAT III finding. See V-220636 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category III; auditors will
  cite V-220636 on the device's POA&M.
references:
  stig: ["V-220636"]
  cci:
    - "CCI-000366"
query:
  path: "$.hardening.all_access_ports_storm_control"
  equals: true
on_fail:
  message: "Cisco IOS L2S STIG V-220636 (III) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220636.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/storm.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/storm.violating.txt
