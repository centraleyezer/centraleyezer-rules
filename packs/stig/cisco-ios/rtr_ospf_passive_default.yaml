id: cisco.ios.stig.v-220503
title: "The Cisco router must default OSPF interfaces to passive and opt in only on the explicit topology."
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  passive-interface default prevents accidental adjacencies on user-facing interfaces — a known leak vector.
rationale: |
  Sourced from the DISA Cisco IOS XE Router RTR STIG. CAT II finding.
  See V-220503 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-220503 on the device's POA&M.
references:
  stig: ["V-220503"]
  cci:
    - "CCI-001958"
query:
  path: "$.routing.ospf.passive_default"
  equals: true
on_fail:
  message: "STIG V-220503 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220503.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/ospf_passive.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/ospf_passive.violating.txt
