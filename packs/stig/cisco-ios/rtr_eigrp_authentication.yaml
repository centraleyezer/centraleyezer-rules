id: cisco.ios.stig.v-220504
title: "The Cisco router must authenticate EIGRP adjacencies with MD5."
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  EIGRP without auth lets any directly attached neighbor inject prefixes; STIG requires MD5 keychain authentication.
rationale: |
  Sourced from the DISA Cisco IOS XE Router RTR STIG. CAT II finding.
  See V-220504 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-220504 on the device's POA&M.
references:
  stig: ["V-220504"]
  cci:
    - "CCI-001958"
query:
  path: "$.routing.eigrp.authenticated"
  equals: true
on_fail:
  message: "STIG V-220504 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220504.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/eigrp_auth.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/eigrp_auth.violating.txt
