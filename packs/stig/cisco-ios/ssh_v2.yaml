id: cisco.ios.stig.v-215844
title: "The Cisco router must use SSH version 2 for remote administration."
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  STIG forbids SSHv1 due to protocol-level integrity weaknesses. Pin ssh to version 2.
rationale: |
  Sourced from the DISA Cisco IOS XE Router NDM STIG. CAT II finding.
  See V-215844 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-215844 on the device's POA&M.
references:
  stig: ["V-215844"]
  cci:
    - "CCI-001941"
    - "CCI-002890"
query:
  path: "$.services.ssh_version"
  equals: 2
on_fail:
  message: "Cisco IOS STIG V-215844 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-215844.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/ssh_v2.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/ssh_v2.violating.txt
