id: cisco.ios.stig.v-215826
title: "The Cisco router must enforce a minimum password length of 8 characters or more."
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  STIG mandates a minimum length for any locally stored credential to resist guessing and brute force.
rationale: |
  Sourced from the DISA Cisco IOS XE Router NDM STIG. CAT II finding.
  See V-215826 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-215826 on the device's POA&M.
references:
  stig: ["V-215826"]
  cci:
    - "CCI-000205"
query:
  path: "$.passwords.min_length"
  in: [8, 10, 12, 14, 16, 18, 20]
on_fail:
  message: "Cisco IOS STIG V-215826 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-215826.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/password_min.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/password_min.violating.txt
