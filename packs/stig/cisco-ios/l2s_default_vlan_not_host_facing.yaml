id: cisco.ios.stig.v-220642
title: "The Cisco switch must not assign the default VLAN (1) to any host-facing access port."
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  Default VLAN attachment lets a misconfigured port join the management broadcast domain and bypass segmentation.
rationale: |
  Sourced from the DISA Cisco IOS XE Switch L2S STIG (CISC-L2-* control family).
  CAT II finding. See V-220642 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-220642 on the device's POA&M.
references:
  stig: ["V-220642"]
  cci:
    - "CCI-000366"
query:
  path: "$.hardening.access_port_in_default_vlan"
  equals: false
on_fail:
  message: "Cisco IOS L2S STIG V-220642 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220642.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/no_vlan1.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/no_vlan1.violating.txt
