id: cisco.ios.stig.v-215823.aux_disabled
title: "The Cisco router must disable the AUX line."
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  The AUX line typically has no physical access control and bypasses VTY ACL/AAA hardening. Must be administratively disabled.
rationale: |
  Sourced from the DISA Cisco IOS XE Router NDM STIG. CAT II finding.
  See V-215823 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-215823 on the device's POA&M.
references:
  stig: ["V-215823"]
  cci:
    - "CCI-000054"
    - "CCI-000382"
query:
  path: "$.hardening.aux_line_disabled"
  equals: true
on_fail:
  message: "Cisco IOS STIG V-215823 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-215823.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/aux.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/aux.violating.txt
