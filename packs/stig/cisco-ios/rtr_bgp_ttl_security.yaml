id: cisco.ios.stig.v-220502
title: "The Cisco router must use TTL security on all eBGP peerings."
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  Generalised TTL Security Mechanism (GTSM, RFC 5082) blocks off-path BGP attacks by enforcing single-hop adjacency.
rationale: |
  Sourced from the DISA Cisco IOS XE Router RTR STIG. CAT II finding.
  See V-220502 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-220502 on the device's POA&M.
references:
  stig: ["V-220502"]
  cci:
    - "CCI-002385"
query:
  path: "$.routing.bgp.ttl_security"
  equals: true
on_fail:
  message: "STIG V-220502 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220502.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/bgp_ttl.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/bgp_ttl.violating.txt
