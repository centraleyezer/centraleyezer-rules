id: cisco.ios.stig.v-215854.aaa_enabled
title: "The Cisco router must enable AAA for management authentication."
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  AAA centralises authentication, authorisation and accounting. Required for STIG-compliant device management.
rationale: |
  Sourced from the DISA Cisco IOS XE Router NDM STIG. CAT II finding.
  See V-215854 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-215854 on the device's POA&M.
references:
  stig: ["V-215854"]
  cci:
    - "CCI-000370"
query:
  path: "$.aaa.new_model"
  equals: true
on_fail:
  message: "Cisco IOS STIG V-215854 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-215854.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/aaa_new_model.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/aaa_new_model.violating.txt
