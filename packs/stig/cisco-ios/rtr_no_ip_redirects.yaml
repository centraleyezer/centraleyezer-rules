id: cisco.ios.stig.v-220506
title: "The Cisco router must not generate ICMP redirect messages."
severity: low
vendors: [cisco-ios, cisco-ios-xe]
description: |
  ICMP redirects allow an attacker to manipulate the routing table on adjacent hosts; STIG disables them globally.
rationale: |
  Sourced from the DISA Cisco IOS XE Router RTR STIG. CAT III finding.
  See V-220506 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category III; auditors will
  cite V-220506 on the device's POA&M.
references:
  stig: ["V-220506"]
  cci:
    - "CCI-000366"
query:
  path: "$.hardening.ip_redirects"
  equals: false
on_fail:
  message: "STIG V-220506 (III) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220506.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/no_ip_redirects.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/no_ip_redirects.violating.txt
