id: cisco.ios.stig.v-220629
title: "The Cisco switch must enable STP Root Guard on ports connected to access-layer switches."
severity: low
vendors: [cisco-ios, cisco-ios-xe]
description: |
  Root Guard prevents a downstream switch from claiming the STP root role and re-routing traffic via an untrusted path.
rationale: |
  Sourced from the DISA Cisco IOS XE Switch L2S STIG (CISC-L2-* control family).
  CAT III finding. See V-220629 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category III; auditors will
  cite V-220629 on the device's POA&M.
references:
  stig: ["V-220629"]
  cci:
    - "CCI-002385"
query:
  path: "$.hardening.root_guard_configured"
  equals: true
on_fail:
  message: "Cisco IOS L2S STIG V-220629 (III) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220629.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/rootguard.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/rootguard.violating.txt
