id: cisco.ios.stig.v-215841.no_default
title: "The Cisco router must not use well-known default SNMP community strings."
severity: high
vendors: [cisco-ios, cisco-ios-xe]
description: |
  Default SNMP communities are public knowledge and effectively grant anonymous read/write to anyone reachable on UDP/161.
rationale: |
  Sourced from the DISA Cisco IOS XE Router NDM STIG. CAT I finding.
  See V-215841 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category I; auditors will
  cite V-215841 on the device's POA&M.
references:
  stig: ["V-215841"]
  cci:
    - "CCI-001967"
query:
  path: "$.snmp.communities[*].name"
  in: ["public", "private", "cisco", "admin"]
  not: true
on_fail:
  message: "Cisco IOS STIG V-215841 (I) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-215841.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/snmp_public.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/snmp_public.violating.txt
