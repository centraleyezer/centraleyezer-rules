id: cisco.ios.stig.v-220500
title: "The Cisco router must authenticate every BGP peer with an MD5 password."
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  Unauthenticated BGP peers can be hijacked to inject prefixes and redirect traffic. STIG requires MD5 auth on every neighbor.
rationale: |
  Sourced from the DISA Cisco IOS XE Router RTR STIG. CAT II finding.
  See V-220500 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-220500 on the device's POA&M.
references:
  stig: ["V-220500"]
  cci:
    - "CCI-001958"
query:
  path: "$.routing.bgp.authenticated"
  equals: true
on_fail:
  message: "STIG V-220500 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220500.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/bgp_auth.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/bgp_auth.violating.txt
