id: cisco.ios.stig.v-220625
title: "The Cisco switch must enable MLS QoS to bound the impact of packet-flooding DoS attacks."
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  MLS QoS classifies and rate-limits queues so a broadcast-storm or scan burst cannot starve legitimate traffic.
rationale: |
  Sourced from the DISA Cisco IOS XE Switch L2S STIG. CAT II finding.
  See V-220625 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-220625 on the device's POA&M.
references:
  stig: ["V-220625"]
  cci:
    - "CCI-001095"
query:
  path: "$.hardening.mls_qos_enabled"
  equals: true
on_fail:
  message: "Cisco IOS L2S STIG V-220625 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220625.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/mls_qos.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/mls_qos.violating.txt
