id: cisco.ios.stig.v-220624
title: "The Cisco switch must authenticate VTP messages with a password."
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  Without VTP authentication, an attacker on a trunked link can flood the domain with a higher VTP revision number and prune or rewrite VLANs fleet-wide.
rationale: |
  Sourced from the DISA Cisco IOS XE Switch L2S STIG (CISC-L2-* control family).
  CAT II finding. See V-220624 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-220624 on the device's POA&M.
references:
  stig: ["V-220624"]
  cci:
    - "CCI-000803"
query:
  path: "$.vtp.password_set"
  equals: true
on_fail:
  message: "Cisco IOS L2S STIG V-220624 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220624.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/vtp_password.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/vtp_password.violating.txt
