id: cisco.ios.stig.v-220638
title: "The Cisco switch must run Rapid Spanning Tree (rapid-pvst) or MST, not classic PVST+."
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  Classic PVST+ has 30–50 second convergence windows that prolong outages and create attack-windows. STIG requires RSTP-class operation.
rationale: |
  Sourced from the DISA Cisco IOS XE Switch L2S STIG (CISC-L2-* control family).
  CAT II finding. See V-220638 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-220638 on the device's POA&M.
references:
  stig: ["V-220638"]
  cci:
    - "CCI-000366"
query:
  path: "$.stp.mode"
  in: ["rapid-pvst", "mst"]
on_fail:
  message: "Cisco IOS L2S STIG V-220638 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220638.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/stp_mode.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/stp_mode.violating.txt
