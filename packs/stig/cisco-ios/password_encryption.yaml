id: cisco.ios.stig.v-215832
title: "The Cisco router must encrypt locally stored passwords using a strong reversible-or-better algorithm."
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  Type 7 obfuscation is trivially reversible. STIG requires PBKDF2 (type 8) or Scrypt (type 9) for stored secrets.
rationale: |
  Sourced from the DISA Cisco IOS XE Router NDM STIG. CAT II finding.
  See V-215832 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-215832 on the device's POA&M.
references:
  stig: ["V-215832"]
  cci:
    - "CCI-000196"
    - "CCI-004062"
    - "CCI-004926"
query:
  path: "$.passwords.encryption"
  in: ["type-8", "type-9"]
on_fail:
  message: "Cisco IOS STIG V-215832 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-215832.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-ios/fixtures/password_encryption.compliant.txt
  negative: ../../cis/cisco-ios/fixtures/password_encryption.violating.txt
