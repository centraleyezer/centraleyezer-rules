id: cisco.asa.stig.v-220800
title: "The Cisco ASA must not accept IKEv1 on the outside interface."
severity: high
vendors: [cisco-asa]
description: |
  IKEv1 has known cryptographic weaknesses and is being deprecated. STIG forbids it on the perimeter.
rationale: |
  Sourced from the DISA Cisco ASA VPN STIG. CAT I finding.
  See V-220800 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category I; auditors will
  cite V-220800 on the device's POA&M.
references:
  stig: ["V-220800"]
  cci:
    - "CCI-001144"
    - "CCI-002418"
query:
  path: "$.hardening.asa_ikev1_outside_enabled"
  equals: false
on_fail:
  message: "STIG V-220800 (I) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220800.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-asa/fixtures/ikev1_outside.compliant.txt
  negative: ../../cis/cisco-asa/fixtures/ikev1_outside.violating.txt
