id: cisco.asa.stig.v-220402
title: "The Cisco ASA must apply an idle SSH timeout of 5 minutes or less."
severity: medium
vendors: [cisco-asa]
description: |
  Idle SSH sessions hijacked by an attacker yield privileged access; STIG caps the idle window.
rationale: |
  Sourced from the DISA Cisco ASA NDM STIG. CAT II finding.
  See V-220402 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-220402 on the device's POA&M.
references:
  stig: ["V-220402"]
  cci:
    - "CCI-001133"
query:
  path: "$.hardening.asa_ssh_timeout"
  in: [1, 2, 3, 4, 5]
on_fail:
  message: "Cisco ASA STIG V-220402 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220402.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-asa/fixtures/ssh_timeout.compliant.txt
  negative: ../../cis/cisco-asa/fixtures/ssh_timeout.violating.txt
