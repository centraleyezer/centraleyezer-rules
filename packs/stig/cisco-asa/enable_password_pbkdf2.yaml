id: cisco.asa.stig.v-220414
title: "The Cisco ASA must encrypt the enable password using PBKDF2."
severity: high
vendors: [cisco-asa]
description: |
  Pre-9.6 ASA enable-password hashes are reversible. STIG mandates the PBKDF2-based scheme.
rationale: |
  Sourced from the DISA Cisco ASA NDM STIG. CAT I finding.
  See V-220414 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category I; auditors will
  cite V-220414 on the device's POA&M.
references:
  stig: ["V-220414"]
  cci:
    - "CCI-000196"
query:
  path: "$.hardening.asa_enable_password_type"
  equals: "pbkdf2"
on_fail:
  message: "Cisco ASA STIG V-220414 (I) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220414.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-asa/fixtures/enable_pbkdf2.compliant.txt
  negative: ../../cis/cisco-asa/fixtures/enable_pbkdf2.violating.txt
