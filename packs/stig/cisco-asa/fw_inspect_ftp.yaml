id: cisco.asa.stig.v-220702
title: "The Cisco ASA must inspect FTP traffic."
severity: medium
vendors: [cisco-asa]
description: |
  FTP inspection is required to open dynamic data-channel pinholes safely; without it admins typically widen ACLs.
rationale: |
  Sourced from the DISA Cisco ASA Firewall STIG. CAT II finding.
  See V-220702 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category II; auditors will
  cite V-220702 on the device's POA&M.
references:
  stig: ["V-220702"]
  cci:
    - "CCI-001094"
query:
  path: "$.hardening.asa_inspect_ftp"
  equals: true
on_fail:
  message: "STIG V-220702 (II) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220702.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-asa/fixtures/inspect_ftp.compliant.txt
  negative: ../../cis/cisco-asa/fixtures/inspect_ftp.violating.txt
