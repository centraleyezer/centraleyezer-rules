id: cisco.asa.stig.v-220410
title: "The Cisco ASA must not have any SNMPv1/v2c community configured."
severity: high
vendors: [cisco-asa]
description: |
  SNMPv1/v2c lacks per-message authentication and encryption; STIG permits SNMPv3 only.
rationale: |
  Sourced from the DISA Cisco ASA NDM STIG. CAT I finding.
  See V-220410 in the current STIG release.
impact: |
  Non-compliance is recorded as a STIG finding at category I; auditors will
  cite V-220410 on the device's POA&M.
references:
  stig: ["V-220410"]
  cci:
    - "CCI-001967"
    - "CCI-002418"
query:
  path: "$.hardening.asa_snmp_community_v1v2"
  equals: false
on_fail:
  message: "Cisco ASA STIG V-220410 (I) is not satisfied."
  remediation_cli: |
    ! Apply the remediation prescribed by STIG V-220410.
    ! See the current STIG release for vendor-supplied CLI.
fixtures:
  positive: ../../cis/cisco-asa/fixtures/no_snmp_comm.compliant.txt
  negative: ../../cis/cisco-asa/fixtures/no_snmp_comm.violating.txt
