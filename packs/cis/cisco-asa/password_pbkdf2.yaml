id: cisco.asa.cis.1.2.6
title: "ASA must use pbkdf2 password encryption"
severity: high
vendors: [cisco-asa]
description: |
  `passwd encryption pbkdf2` must be configured. Older `encrypted`
  / weak-hash modes are GPU-crackable.
rationale: |
  ASA's legacy password hashes (pre-9.6) are reversible offline.
  PBKDF2 is the modern KDF the ASA exposes.
impact: |
  Recovery of admin passwords from any config dump.
references:
  cis: "CIS Cisco ASA Benchmark — 1.2.1"
  nist: ["IA-5", "IA-7"]
  cwe: [916, 327]
query:
  path: "$.passwords.encryption"
  equals: "type-9"
on_fail:
  message: "ASA password encryption is not pbkdf2."
  remediation_cli: |
    configure terminal
     passwd encryption pbkdf2
     ! re-set enable + line passwords with the new mode active
    end
    write memory
fixtures:
  positive: fixtures/passwd_pbkdf2.compliant.txt
  negative: fixtures/passwd_pbkdf2.violating.txt
