id: cisco.asa.cis.4.1.2
title: "Authenticate NTP on the ASA"
severity: medium
vendors: [cisco-asa]
description: |
  ASA must authenticate its NTP servers.
rationale: |
  Without authentication, an attacker who can reach the NTP path
  can rewind time and break certificate validation on connected
  VPN clients, AAA, and logging.
impact: |
  Certificate-validation collapse, breaks VPN trust anchor.
references:
  cis: "CIS Cisco ASA Benchmark — 4.1.2"
  nist: ["AU-8", "SC-13"]
  cwe: [294]
query:
  path: "$.ntp.authenticated"
  equals: true
on_fail:
  message: "ASA NTP servers are not authenticated."
  remediation_cli: |
    configure terminal
     ntp authentication-key 1 md5 SECRET
     ntp authenticate
     ntp trusted-key 1
     ntp server 10.0.0.10 key 1
    end
    write memory
fixtures:
  positive: fixtures/ntp_auth.compliant.txt
  negative: fixtures/ntp_auth.violating.txt
