id: cisco.asa.cis.1.2.1
title: "ASA enable password must be PBKDF2 (not cleartext / legacy)"
severity: high
vendors: [cisco-asa]
description: |
  `enable password <X> pbkdf2` must be configured. Cleartext
  or legacy-encrypted enable passwords are reversible by anyone
  with access to the running config.
rationale: |
  Pre-9.6 ASA encoded the enable password with a reversible
  scheme. Modern ASA supports PBKDF2 which is non-reversible.
  Any backup of the config containing a cleartext or legacy
  enable password is a direct credential leak.
impact: |
  Enable password recoverable from any backup or `show
  running-config` capture.
references:
  cis: "CIS Cisco ASA Benchmark — 1.2.1"
  nist: ["IA-5"]
  cwe: [256, 522]
query:
  path: "$.hardening.asa_enable_password_type"
  equals: "pbkdf2"
on_fail:
  message: "enable password is not stored as PBKDF2."
  remediation_cli: |
    configure terminal
     enable password <NEW-STRONG-PASSWORD> pbkdf2
    end
    write memory
fixtures:
  positive: fixtures/enable_pbkdf2.compliant.txt
  negative: fixtures/enable_pbkdf2.violating.txt
