id: cisco.asa.cis.1.3.1
title: "ASA `aaa local authentication attempts max-fail` must be set"
severity: medium
vendors: [cisco-asa]
description: |
  `aaa local authentication attempts max-fail <N>` must be
  configured with N ≤ 5 so the device locks out a local
  account after that many consecutive failed authentications.
rationale: |
  This is the only defense against password-spray attacks on
  the break-glass local account. Without lockout, an attacker
  on the management VRF can grind the local password offline
  via the device itself.
impact: |
  Unbounded brute-force window against local accounts.
references:
  cis: "CIS Cisco ASA Benchmark — 1.3.1"
  nist: ["AC-7"]
  cwe: [307]
query:
  path: "$.aaa.max_login_attempts"
  in: [1, 2, 3, 4, 5]
on_fail:
  message: "aaa local authentication attempts max-fail is not set ≤ 5."
  remediation_cli: |
    configure terminal
     aaa local authentication attempts max-fail 5
    end
    write memory
fixtures:
  positive: fixtures/max_fail.compliant.txt
  negative: fixtures/max_fail.violating.txt
