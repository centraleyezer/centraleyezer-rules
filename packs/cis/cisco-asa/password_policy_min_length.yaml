id: cisco.asa.cis.1.2.5
title: "ASA `password-policy minimum-length` must be ≥ 8"
severity: medium
vendors: [cisco-asa]
description: |
  `password-policy minimum-length <N>` must be configured with
  N ≥ 8 so the ASA rejects local passwords shorter than 8
  characters at creation time.
rationale: |
  8 is the NIST 800-63B floor for user-chosen passwords (with
  modern hashing). Anything shorter is brute-forced offline
  in minutes against a captured config-resident hash.
impact: |
  Weak local passwords accepted; offline brute-force trivial
  against any leaked backup.
references:
  cis: "CIS Cisco ASA Benchmark — 1.2.5"
  nist: ["IA-5"]
  cwe: [521]
query:
  path: "$.hardening.asa_pwd_policy_min_length"
  in: [8, 9, 10, 11, 12, 14, 16, 18, 20]
on_fail:
  message: "password-policy minimum-length is not set ≥ 8."
  remediation_cli: |
    configure terminal
     password-policy minimum-length 12
    end
    write memory
fixtures:
  positive: fixtures/pwd_minlen.compliant.txt
  negative: fixtures/pwd_minlen.violating.txt
