id: cisco.asa.cis.1.2.4
title: "ASA `password-policy lifetime` must be set (≤ 365 days)"
severity: medium
vendors: [cisco-asa]
description: |
  `password-policy lifetime <N>` must be configured with N ≤ 365
  so local-user passwords expire on a defined cadence.
rationale: |
  Local-account passwords are stored in every backup of the
  running config. Rotating them on a defined cadence limits the
  window during which a leaked backup yields valid credentials.
impact: |
  Local passwords never expire; a leaked backup yields valid
  credentials indefinitely.
references:
  cis: "CIS Cisco ASA Benchmark — 1.2.4"
  nist: ["IA-5"]
  cwe: [262]
query:
  path: "$.hardening.asa_pwd_policy_lifetime"
  in: [30, 60, 90, 120, 180, 270, 365]
on_fail:
  message: "password-policy lifetime is not set ≤ 365 days."
  remediation_cli: |
    configure terminal
     password-policy lifetime 90
    end
    write memory
fixtures:
  positive: fixtures/pwd_lifetime.compliant.txt
  negative: fixtures/pwd_lifetime.violating.txt
