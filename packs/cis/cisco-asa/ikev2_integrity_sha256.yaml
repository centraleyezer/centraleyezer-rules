id: cisco.asa.cis.5.1.6
title: "ASA IKEv2 integrity must be SHA-256 or stronger"
severity: high
vendors: [cisco-asa]
description: |
  IKEv2 policy must set `integrity sha256` (or sha384/sha512).
  SHA-1 and MD5 are deprecated for modern IKE/IPsec.
rationale: |
  SHA-1 has known collision attacks; MD5 is broken. NIST and
  CIS both retire these for SA integrity. SHA-256 minimum is
  the contemporary baseline.
impact: |
  IKE message tampering / collision risk under SHA-1 / MD5.
references:
  cis: "CIS Cisco ASA Benchmark — 5.1.6"
  nist: ["SC-13"]
  cwe: [327]
query:
  path: "$.hardening.asa_ikev2_integrity"
  in: ["sha256", "sha384", "sha512"]
on_fail:
  message: "ASA IKEv2 integrity is not SHA-256+."
  remediation_cli: |
    configure terminal
     crypto ikev2 policy 10
      integrity sha256
    end
    write memory
fixtures:
  positive: fixtures/ikev2_integrity.compliant.txt
  negative: fixtures/ikev2_integrity.violating.txt
