id: cisco.ios.cis.5.1.3
title: "Logging trap severity must be informational or lower"
severity: low
vendors: [cisco-ios, cisco-ios-xe]
description: |
  `logging trap informational` (or a more verbose level) must be
  configured so syslog captures the full operational signal.
rationale: |
  Higher severity-only thresholds (warnings / errors only) drop
  the routine login + config-change events that incident response
  needs first.
impact: |
  Missing audit context around the events leading up to an
  incident.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — 5.1.3"
  nist: ["AU-2", "AU-3"]
  cwe: [778]
query:
  path: "$.logging.level"
  in: [informational, debugging]
on_fail:
  message: "logging trap level is more restrictive than informational."
  remediation_cli: |
    configure terminal
     logging trap informational
    end
    write memory
fixtures:
  positive: fixtures/logging_trap.compliant.txt
  negative: fixtures/logging_trap.violating.txt
