id: cisco.ios.cis.2.2.25
title: "Disable `ip http secure-active-session-modules` (HTTPS variant)"
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  `ip http secure-active-session-modules none` must be set —
  the HTTPS sibling of the HTTP module rule (2.2.18). Even on
  devices that legitimately need the HTTPS management server,
  the per-module HTTP-overlay endpoints should be off.
rationale: |
  Same logic as 2.2.18 — the active-session-modules expose
  per-module HTTPS endpoints (REST, EEM, RESTCONF) that are
  not required for the standard EWS / ASDM-equivalent
  management interface and have their own CVE history.
impact: |
  Per-module HTTPS endpoints exposed; module-specific CVE
  surface (RESTCONF, NETCONF/HTTPS) reachable.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — 2.2.25"
  nist: ["CM-7", "AC-17"]
  cwe: [284]
query:
  path: "$.hardening.ip_http_secure_active_session_modules"
  equals: "none"
on_fail:
  message: "ip http secure-active-session-modules is not set to none."
  remediation_cli: |
    configure terminal
     ip http secure-active-session-modules none
    end
    write memory
fixtures:
  positive: fixtures/https_modules.compliant.txt
  negative: fixtures/https_modules.violating.txt
