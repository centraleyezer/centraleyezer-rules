id: cisco.ios.cis.1.1.14
title: "At least 2 local user accounts must exist (break-glass redundancy)"
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  At least 2 local `username` accounts must be defined so the
  device retains a working break-glass credential when one
  local account's password is forgotten or compromised mid-
  incident.
rationale: |
  Single-account devices have a single point of failure for
  emergency access. The standard hardening pattern is two
  distinct accounts (primary admin + emergency) stored in
  separate password vaults.
impact: |
  Single point of failure for break-glass access; one
  forgotten password locks operators out of the device when
  AAA is also unreachable.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — 1.1.10"
  nist: ["AC-2", "CP-2"]
  cwe: []
query:
  path: "$.hardening.local_user_count"
  in: [2, 3, 4, 5, 6, 7, 8, 9, 10]
on_fail:
  message: "Fewer than 2 local user accounts are defined."
  remediation_cli: |
    configure terminal
     username netzer-primary privilege 15 algorithm-type sha256 secret <X>
     username netzer-breakglass privilege 15 algorithm-type sha256 secret <Y>
    end
    write memory
fixtures:
  positive: fixtures/break_glass.compliant.txt
  negative: fixtures/break_glass.violating.txt
