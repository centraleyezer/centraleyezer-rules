id: cisco.ios.cis.1.3.3
title: "At least two local user accounts must exist"
severity: low
vendors: [cisco-ios, cisco-ios-xe]
description: |
  At least two local user accounts must be defined so an operator
  is never locked out by a stale-password / disabled-account
  problem with a single account.
rationale: |
  A device with a single local user (after the AAA server
  becomes unreachable) is one disabled-account event away from
  console-with-physical-access recovery.
impact: |
  Single-user lockout risk during AAA outage; mandatory
  on-prem recovery time during incidents.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — 1.3.3"
  nist: ["CP-2"]
  cwe: []
query:
  path: "$.users[1]"
  exists: true
on_fail:
  message: "Fewer than 2 local user accounts are defined."
  remediation_cli: |
    configure terminal
     username netadmin privilege 1 secret <STRONG>
     username noc-user privilege 1 secret <STRONG>
    end
    write memory
fixtures:
  positive: fixtures/min_two.compliant.txt
  negative: fixtures/min_two.violating.txt
