id: cisco.ios.cis.7.3.3
title: "Disable IP DHCP gleaning"
severity: low
vendors: [cisco-ios, cisco-ios-xe]
description: |
  `no ip dhcp gleaning` must be in effect. DHCP gleaning silently
  builds binding entries from L3 DHCP relay traffic — which can
  poison the DHCP-snooping binding table.
rationale: |
  Gleaning bypasses DHCP snooping's normal trust model. Bindings
  recorded via gleaning aren't validated against `ip dhcp
  snooping trust` and downstream IP source-guard checks can
  accept attacker-supplied IP/MAC pairs.
impact: |
  Bypass of DHCP-snooping binding-table integrity; IP source-
  guard mis-decision.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — 7.3.3"
  nist: ["SC-7"]
  cwe: [346]
query:
  path: "$.hardening.ip_dhcp_gleaning"
  equals: false
on_fail:
  message: "ip dhcp gleaning is enabled."
  remediation_cli: |
    configure terminal
     no ip dhcp gleaning
    end
    write memory
fixtures:
  positive: fixtures/no_gleaning.compliant.txt
  negative: fixtures/no_gleaning.violating.txt
