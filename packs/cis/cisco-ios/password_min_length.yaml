id: cisco.ios.cis.1.2.2
title: "Enforce a minimum password length of at least 8"
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  Local password policy must require at least 8 characters. CIS
  recommends 14 for high-assurance environments; 8 is the floor.
rationale: |
  Short passwords are exhaustible offline within minutes once the
  hash is recovered, even with strong algorithms.
impact: |
  Local account compromise from any hash exfiltration event.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — 1.2.2"
  nist: ["IA-5"]
  cwe: [521]
query:
  path: "$.passwords.min_length"
  in: [8, 10, 12, 14, 16, 18, 20]
# This is a workaround — the DSL doesn't have ">=" yet. The CIS L1
# baseline is 8; this fixture intentionally tests for ≥8 with an
# enumerated list. A future enhancement would add a `min:` operator.
on_fail:
  message: "Password minimum length is not configured to at least 8."
  remediation_cli: |
    configure terminal
     security passwords min-length 14
    end
    write memory
fixtures:
  positive: fixtures/password_min.compliant.txt
  negative: fixtures/password_min.violating.txt
