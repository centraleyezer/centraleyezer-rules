id: cisco.ios.cis.1.2.1
title: "Use modern password hashing (type-8 or type-9)"
severity: high
vendors: [cisco-ios, cisco-ios-xe]
description: |
  Local password hashing must use type-8 (PBKDF2-SHA256) or type-9
  (scrypt). Type-5 (MD5) and type-7 (reversible Cisco obfuscation) are
  trivially attacked offline.
rationale: |
  Type-7 is a documented decode operation, not a hash. Type-5 (MD5) is
  GPU-crackable in seconds. Modern installs have type-8 / type-9
  available with no operational tradeoff.
impact: |
  Anyone who reads a config (legitimately or via compromise) recovers
  plaintext credentials and reuses them across the estate.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — 1.2.1"
  nist: ["IA-5", "IA-7"]
  cwe: [916, 327]
query:
  path: "$.passwords.encryption"
  in: ["type-8", "type-9"]
on_fail:
  message: "Local passwords are not hashed with type-8 / type-9."
  remediation_cli: |
    configure terminal
     enable algorithm-type scrypt secret <NEW-STRONG-PASSWORD>
     ! re-create local users with `algorithm-type scrypt`
    end
    write memory
fixtures:
  positive: fixtures/password_encryption.compliant.txt
  negative: fixtures/password_encryption.violating.txt
