id: cisco.ios.cis.1.3.1
title: "Local users must not be created at privilege level 15"
severity: high
vendors: [cisco-ios, cisco-ios-xe]
description: |
  Local user accounts must be created at privilege 1 (or the role
  level the AAA model assigns). Operators should escalate to
  enable mode via `enable secret`, not log in already at level 15.
rationale: |
  A compromised level-15 account is full-device admin from the
  first character of password — no per-command authorization, no
  enable-mode separation, no command accounting.
impact: |
  Full device compromise from a single account; no separation
  between authentication and privilege escalation.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — 1.3.1"
  nist: ["AC-3", "AC-6", "IA-2"]
  cwe: [250]
query:
  path: "$.users[*].privilege"
  equals: 15
  not: true
on_fail:
  message: "At least one local user is created at privilege 15."
  remediation_cli: |
    configure terminal
     no username <USER>
     username <USER> privilege 1 secret <STRONG>
     ! Set/refresh enable secret for escalation:
     enable algorithm-type scrypt secret <STRONG>
    end
    write memory
fixtures:
  positive: fixtures/no_priv15.compliant.txt
  negative: fixtures/no_priv15.violating.txt
