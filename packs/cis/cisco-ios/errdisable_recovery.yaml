id: cisco.ios.cis.7.3.5
title: "errdisable recovery must be configured"
severity: low
vendors: [cisco-ios, cisco-ios-xe]
description: |
  At least one `errdisable recovery cause <X>` or `errdisable
  recovery interval N` must be configured so security-driven
  port shutdowns (BPDU guard, port-security, storm-control)
  can recover automatically after the configured interval.
rationale: |
  Without recovery, transient L2 events that trip a port
  protection require manual operator intervention per port —
  defeating the unattended-operation premise of L2 security
  features.
impact: |
  Transient port-security / BPDU-guard / storm-control events
  leave ports permanently dark until manually re-enabled.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — 7.3.5"
  nist: ["SC-5"]
  cwe: []
query:
  path: "$.hardening.errdisable_recovery_configured"
  equals: true
on_fail:
  message: "No errdisable recovery configuration present."
  remediation_cli: |
    configure terminal
     errdisable recovery cause bpduguard
     errdisable recovery cause psecure-violation
     errdisable recovery interval 300
    end
    write memory
fixtures:
  positive: fixtures/errdis_recov.compliant.txt
  negative: fixtures/errdis_recov.violating.txt
