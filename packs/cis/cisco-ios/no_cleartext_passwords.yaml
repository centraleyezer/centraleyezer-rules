id: cisco.ios.cis.1.2.3
title: "No cleartext (type-0) local passwords"
severity: critical
vendors: [cisco-ios, cisco-ios-xe]
description: |
  No local user account may store its password as type-0 (clear
  text). Even with `service password-encryption` enabled, type-0
  passwords are recovered trivially from the running-config.
rationale: |
  Type-0 passwords are not hashed at all. Anyone who can read the
  config (legitimately or via compromise) reads the password.
impact: |
  Immediate credential recovery from any config-disclosure event.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — 1.2.3"
  nist: ["IA-5", "IA-7"]
  cwe: [256, 916]
query:
  path: "$.users[*].hash_type"
  in: ["plaintext"]
  not: true
on_fail:
  message: "At least one local user has a cleartext (type-0) password."
  remediation_cli: |
    configure terminal
     no username <USER>
     username <USER> privilege 1 algorithm-type scrypt secret <STRONG>
    end
    write memory
fixtures:
  positive: fixtures/no_cleartext.compliant.txt
  negative: fixtures/no_cleartext.violating.txt
