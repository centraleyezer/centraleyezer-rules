id: cisco.ios.cis.3.6.6
title: "`ip ssh source-interface` must be set"
severity: low
vendors: [cisco-ios, cisco-ios-xe]
description: |
  `ip ssh source-interface <INTERFACE>` must be configured
  (typically Loopback0 or a management interface) so outbound
  SSH from the device uses a deterministic, central-jumphost-
  ACL-allowed source IP.
rationale: |
  Without a fixed source-interface, outbound SSH chooses
  whichever egress IP wins routing — which may not match the
  central jump-host's ACL. Pinning to a known IP makes the
  device-initiated SSH path deterministic.
impact: |
  Outbound SSH source IP varies; central jump-host ACLs
  intermittently deny legitimate device-initiated SSH.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — 3.6.6"
  nist: ["AC-17", "SC-7"]
  cwe: []
query:
  path: "$.hardening.ip_ssh_source_interface"
  exists: true
on_fail:
  message: "ip ssh source-interface is not configured."
  remediation_cli: |
    configure terminal
     ip ssh source-interface Loopback0
    end
    write memory
fixtures:
  positive: fixtures/ssh_src_iface.compliant.txt
  negative: fixtures/ssh_src_iface.violating.txt
