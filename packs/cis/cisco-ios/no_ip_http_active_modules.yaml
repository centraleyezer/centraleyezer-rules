id: cisco.ios.cis.2.2.18
title: "Disable `ip http active-session-modules`"
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  `ip http active-session-modules none` must be configured. The
  HTTP active-session-modules expose extra HTTP-based management
  surfaces (REST, EEM applet, RESTCONF) that should be reachable
  only via authenticated paths.
rationale: |
  Disabling the active-session-modules at the HTTP layer hardens
  the device against module-specific HTTP/HTTPS surface even
  when the HTTPS server itself is enabled for legitimate
  management (e.g. EWS, ASDM-equivalent).
impact: |
  Exposed module-specific HTTP endpoints; module-specific CVE
  surface (RESTCONF, NETCONF over HTTP, etc.).
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — 2.2.18"
  nist: ["CM-7", "AC-17"]
  cwe: [284]
query:
  path: "$.hardening.ip_http_active_session_modules"
  equals: "none"
on_fail:
  message: "ip http active-session-modules is not set to none."
  remediation_cli: |
    configure terminal
     ip http active-session-modules none
    end
    write memory
fixtures:
  positive: fixtures/http_modules.compliant.txt
  negative: fixtures/http_modules.violating.txt
