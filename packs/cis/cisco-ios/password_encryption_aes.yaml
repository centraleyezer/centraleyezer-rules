id: cisco.ios.cis.1.1.11
title: "`password encryption aes` must be enabled"
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  `password encryption aes` must be configured so IOS uses the
  AES-based primary-key vault (rather than the legacy
  reversible scheme) for any pre-shared keys, ISAKMP secrets,
  and other config-stored shared keys.
rationale: |
  Without `password encryption aes`, shared keys (IKE preshared
  keys, RADIUS keys, OSPF keychains) are stored with a
  reversible IOS scheme that's trivially decoded. The AES
  vault binds them to the device's primary key.
impact: |
  Pre-shared keys recoverable offline from any config backup.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — 1.1.11"
  nist: ["IA-5", "SC-28"]
  cwe: [261]
query:
  path: "$.hardening.password_encryption_aes"
  equals: true
on_fail:
  message: "password encryption aes is not enabled."
  remediation_cli: |
    configure terminal
     key config-key password-encrypt
     password encryption aes
    end
    write memory
fixtures:
  positive: fixtures/pwd_aes.compliant.txt
  negative: fixtures/pwd_aes.violating.txt
