id: cisco.ios.cis.3.2.5
title: "`ip icmp rate-limit unreachable` must be configured"
severity: low
vendors: [cisco-ios, cisco-ios-xe]
description: |
  `ip icmp rate-limit unreachable <MS>` must be configured to
  bound the rate at which the router generates ICMP
  unreachable messages — a key DoS mitigation against being
  used as a reflection amplifier.
rationale: |
  Without rate-limiting, an attacker can send packets that
  trigger ICMP unreachables and amplify their traffic through
  the router. Rate-limiting unreachables also reduces the
  control-plane CPU cost of handling such traffic.
impact: |
  Router can be used as an ICMP-unreachable reflector; CPU
  burn from generating unreachables at line rate.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — 3.2.5"
  nist: ["SC-5"]
  cwe: [400]
query:
  path: "$.hardening.ip_icmp_rate_limit"
  equals: true
on_fail:
  message: "ip icmp rate-limit unreachable is not configured."
  remediation_cli: |
    configure terminal
     ip icmp rate-limit unreachable 500
    end
    write memory
fixtures:
  positive: fixtures/icmp_rl.compliant.txt
  negative: fixtures/icmp_rl.violating.txt
