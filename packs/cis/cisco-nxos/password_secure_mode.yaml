id: cisco.nxos.cis.1.2.2
title: "Enable password secure-mode on NX-OS"
severity: high
vendors: [cisco-nx-os]
description: |
  `password secure-mode` must be enabled so all local password
  hashes use the strong SHA-256-based algorithm (NX-OS type-9
  equivalent).
rationale: |
  Without secure-mode, NX-OS may store passwords in a weak format
  that is recoverable offline. Secure-mode pins the device to the
  modern hash for every new password.
impact: |
  Recoverable local passwords from any config disclosure event.
references:
  cis: "CIS Cisco NX-OS Benchmark — 1.2.2"
  nist: ["IA-5", "IA-7"]
  cwe: [916]
query:
  path: "$.passwords.encryption"
  equals: "type-9"
on_fail:
  message: "password secure-mode is not enabled."
  remediation_cli: |
    configure terminal
     password secure-mode
    end
    copy running-config startup-config
fixtures:
  positive: fixtures/pwd_secure.compliant.txt
  negative: fixtures/pwd_secure.violating.txt
