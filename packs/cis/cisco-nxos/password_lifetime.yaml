id: cisco.nxos.cis.1.2.3
title: "NX-OS userpassphrase lifetime must be set (≤ 90 days)"
severity: medium
vendors: [cisco-nx-os]
description: |
  `userpassphrase lifetime N` (≤ 90 days) must be configured so
  local-user passwords expire on a schedule.
rationale: |
  Permanent local-user passwords drift further from the rest of
  the credential lifecycle every quarter. Tying them to a
  rotation schedule keeps the local-fallback path in sync with
  the central credential policy.
impact: |
  Local-user passwords age out of policy; rotation drift between
  central AAA and local fallback.
references:
  cis: "CIS Cisco NX-OS Benchmark — 1.2.3"
  nist: ["IA-5"]
  cwe: []
query:
  path: "$.passwords.lifetime_days"
  in: [30, 45, 60, 75, 90]
on_fail:
  message: "userpassphrase lifetime is not set to ≤ 90 days."
  remediation_cli: |
    configure terminal
     userpassphrase lifetime 90
    end
    copy running-config startup-config
fixtures:
  positive: fixtures/pwd_lifetime.compliant.txt
  negative: fixtures/pwd_lifetime.violating.txt
