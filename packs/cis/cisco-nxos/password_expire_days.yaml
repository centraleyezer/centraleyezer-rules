id: cisco.nxos.cis.1.2.8
title: "NX-OS `password expire-days` must be set (≤ 365)"
severity: low
vendors: [cisco-nx-os]
description: |
  `password expire-days <N>` must be configured with N ≤ 365
  so local account passwords expire on a known cadence rather
  than living forever.
rationale: |
  Rotating local passwords on a defined cadence is one of the
  cheapest defenses against silent credential theft — even if
  the hash is compromised, the password rotates out within the
  cadence window.
impact: |
  Local passwords never expire; once exposed they stay valid
  indefinitely.
references:
  cis: "CIS Cisco NX-OS Benchmark — 1.2.8"
  nist: ["IA-5"]
  cwe: [262]
query:
  path: "$.hardening.nxos_password_expire_days"
  in: [30, 60, 90, 120, 180, 270, 365]
on_fail:
  message: "password expire-days is not set ≤ 365."
  remediation_cli: |
    configure terminal
     password expire-days 90
    end
    copy running-config startup-config
fixtures:
  positive: fixtures/pw_expire.compliant.txt
  negative: fixtures/pw_expire.violating.txt
