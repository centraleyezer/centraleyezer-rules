id: cisco.nxos.cis.1.1.9
title: "NX-OS must have at least 2 local user accounts (break-glass redundancy)"
severity: medium
vendors: [cisco-nx-os]
description: |
  At least 2 local `username` accounts must be defined so the
  device retains a working break-glass credential when one
  local account's password is forgotten or compromised
  mid-incident. NX-OS sibling of cisco.ios.cis.1.1.10 /
  cisco.asa.cis.1.1.1.
rationale: |
  Single-account devices have a single point of failure for
  emergency access. The hardening standard is two distinct
  accounts (primary admin + emergency) stored in separate
  password vaults.
impact: |
  Single point of failure for break-glass access during AAA
  outage; one forgotten password locks operators out.
references:
  cis: "CIS Cisco NX-OS Benchmark — 1.1.9"
  nist: ["AC-2", "CP-2"]
  cwe: []
query:
  path: "$.hardening.nxos_user_count"
  in: [2, 3, 4, 5, 6, 7, 8, 9, 10]
on_fail:
  message: "Fewer than 2 local user accounts are defined."
  remediation_cli: |
    configure terminal
     username netzer-primary password <X> role network-admin
     username netzer-breakglass password <Y> role network-admin
    end
    copy running-config startup-config
fixtures:
  positive: fixtures/nxos_2users.compliant.txt
  negative: fixtures/nxos_2users.violating.txt
