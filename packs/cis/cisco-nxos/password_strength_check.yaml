id: cisco.nxos.cis.1.2.1
title: "Enable password strength-check on NX-OS"
severity: medium
vendors: [cisco-nx-os]
description: |
  `password strength-check` must be enabled so new local
  passwords are rejected unless they meet length / complexity
  requirements.
rationale: |
  Without strength-check, NX-OS accepts trivially-weak local
  passwords (under 8 chars, dictionary words, repeated chars).
impact: |
  Brute-forceable local accounts persist undetected until rotated.
references:
  cis: "CIS Cisco NX-OS Benchmark — 1.2.1"
  nist: ["IA-5"]
  cwe: [521]
query:
  path: "$.passwords.min_length"
  in: [8, 10, 12, 14, 16, 18, 20]
on_fail:
  message: "password strength-check is not enabled."
  remediation_cli: |
    configure terminal
     password strength-check
    end
    copy running-config startup-config
fixtures:
  positive: fixtures/pwd_strength.compliant.txt
  negative: fixtures/pwd_strength.violating.txt
