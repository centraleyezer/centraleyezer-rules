id: cisco.nxos.cis.1.1.7
title: "NX-OS default `admin` account must be removed or renamed"
severity: high
vendors: [cisco-nx-os]
description: |
  The factory-default `admin` username must not be present in
  the configuration. Rename the account or delete it after
  creating named operator accounts.
rationale: |
  `admin` is the well-known default username on NX-OS;
  credential-stuffing and password-spray attacks target it
  first. Renaming forces attackers to also guess the username,
  reducing the probability of a successful brute-force.
impact: |
  Default username present; first-target for any
  credential-stuffing attack.
references:
  cis: "CIS Cisco NX-OS Benchmark — 1.1.7"
  nist: ["IA-5", "AC-2"]
  cwe: [521, 798]
query:
  path: "$.hardening.nxos_has_default_admin"
  equals: false
on_fail:
  message: "Default `admin` account is present."
  remediation_cli: |
    configure terminal
     no username admin
     username netzer-admin password <STRONG-PASSWORD> role network-admin
    end
    copy running-config startup-config
fixtures:
  positive: fixtures/no_default_admin.compliant.txt
  negative: fixtures/no_default_admin.violating.txt
