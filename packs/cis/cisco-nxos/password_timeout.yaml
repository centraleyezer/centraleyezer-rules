id: cisco.nxos.cis.1.2.4
title: "NX-OS `password timeout` must be set (≤ 5 minutes)"
severity: low
vendors: [cisco-nx-os]
description: |
  `password timeout N` (minutes) must be configured. After N
  minutes of idle at a password prompt the session is dropped.
rationale: |
  Without a timeout, an attacker who interrupts an admin mid-
  login (after the username is entered) can keep the prompt
  open indefinitely.
impact: |
  Session-state harvesting at the login prompt.
references:
  cis: "CIS Cisco NX-OS Benchmark — 1.2.4"
  nist: ["AC-7", "AC-12"]
  cwe: [613]
query:
  path: "$.hardening.nxos_password_timeout"
  in: [1, 2, 3, 4, 5]
on_fail:
  message: "password timeout is not set to ≤ 5."
  remediation_cli: |
    configure terminal
     password timeout 5
    end
    copy running-config startup-config
fixtures:
  positive: fixtures/pwd_timeout.compliant.txt
  negative: fixtures/pwd_timeout.violating.txt
