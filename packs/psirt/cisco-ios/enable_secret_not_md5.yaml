id: cisco.ios.psirt.enable_secret_not_md5
title: "Enable secret must not be type-5 (MD5)"
severity: high
vendors: [cisco-ios, cisco-ios-xe]
description: |
  `enable secret` must be stored as type-8 (PBKDF2) or type-9
  (scrypt). Type-5 (MD5-based) is recoverable via off-the-shelf
  tools on commodity GPUs and must not be used on new
  configurations.
rationale: |
  Type-5 (`enable secret 5 $1$...`) has been broken since
  ~2013; rainbow-table and brute-force attacks against the
  MD5-based scheme are routine. Modern IOS supports type-8
  (PBKDF2-SHA-256) and type-9 (scrypt) which are vastly
  more expensive to attack offline.
impact: |
  Enable secret recoverable from any backup or `show running-
  config` capture within hours.
references:
  cis: ""
  nist: ["IA-5", "IA-7"]
  cwe: [916, 327]
query:
  path: "$.passwords.encryption"
  in: ["type-8", "type-9"]
on_fail:
  message: "enable secret is not type-8 / type-9 (legacy MD5)."
  remediation_cli: |
    configure terminal
     enable algorithm-type sha256 secret <NEW-STRONG-PASSWORD>
    end
    write memory
fixtures:
  positive: fixtures/enable_not_md5.compliant.txt
  negative: fixtures/enable_not_md5.violating.txt
