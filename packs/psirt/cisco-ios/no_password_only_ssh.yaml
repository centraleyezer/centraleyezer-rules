id: cisco.ios.psirt.no_password_only_ssh
title: "SSH server must not accept password-only authentication"
severity: high
vendors: [cisco-ios, cisco-ios-xe]
description: |
  When `ip ssh server algorithm authentication` is configured,
  the list must not consist solely of `password`. Either
  `publickey` or `keyboard-interactive` (for AAA-backed prompts)
  must be in the accepted set.
rationale: |
  Cisco's hardening guide and multiple PSIRT advisories
  (cisco-sa-ssh-passwd-2018 era) recommend disabling
  password-only SSH on production gear. A password-only listener
  is the highest-yield brute-force surface available.
impact: |
  Continued exposure to commodity SSH brute-force from the
  Internet at large.
references:
  cis: "Overlaps cisco.ios.cis.2.1.7"
  nist: ["IA-2", "IA-5"]
  cwe: [307]
query:
  path: "$.crypto.ssh_auth_methods[*]"
  in: ["password"]
  not: true
on_fail:
  message: "SSH server accepts password-only authentication."
  remediation_cli: |
    configure terminal
     ip ssh server algorithm authentication publickey keyboard
    end
    write memory
fixtures:
  positive: fixtures/ssh_auth_methods.compliant.txt
  negative: fixtures/ssh_auth_methods.violating.txt
