id: cisco.ios.psirt.no_type7_passwords
title: "No local user account may use type-7 (Vigenere) password"
severity: high
vendors: [cisco-ios, cisco-ios-xe]
description: |
  No `username ... password 7 ...` line may appear. Type-7 is
  the Vigenere-cipher scheme — fully reversible by anyone with
  access to the config file. Use `secret 8` (PBKDF2-SHA-256)
  or `secret 9` (scrypt) instead.
rationale: |
  Type-7 passwords are reversible offline in milliseconds
  using any of the public decoders (cisco7decode, etc.). They
  offer zero protection against config-disclosure. Anyone
  copying the running-config to a ticket or pasting it into a
  vendor support case is exposing the credential.
impact: |
  Local user passwords trivially recoverable from any config
  snapshot.
references:
  cis: ""
  nist: ["IA-5", "IA-7"]
  cwe: [261, 327]
query:
  path: "$.users[*].hash_type"
  in: ["type-7", "7"]
  not: true
on_fail:
  message: "At least one user account uses a type-7 (Vigenere) password."
  remediation_cli: |
    configure terminal
     no username <NAME>
     username <NAME> privilege 15 algorithm-type sha256 secret <NEW>
    end
    write memory
fixtures:
  positive: fixtures/type7.compliant.txt
  negative: fixtures/type7.violating.txt
