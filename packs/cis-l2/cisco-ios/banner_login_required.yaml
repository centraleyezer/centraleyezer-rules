id: cisco.ios.cis-l2.1.3.6
title: "L2: Login banner must be configured"
severity: low
vendors: [cisco-ios, cisco-ios-xe]
description: |
  `banner login <DELIM><text><DELIM>` must be present. The
  login banner is shown after the MOTD but BEFORE the
  username prompt — the right place for the
  acceptable-use-and-monitoring notice.
rationale: |
  Some auditors require the warning text appear AFTER the
  MOTD (which often is operational context) but BEFORE the
  credential prompt. `banner login` is that hook.
impact: |
  No acceptable-use banner before authentication; legal
  posture weaker.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — L2 1.3.6"
  nist: ["AC-8"]
  cwe: []
query:
  path: "$.banners.login"
  exists: true
on_fail:
  message: "Login banner is not configured."
  remediation_cli: |
    configure terminal
     banner login ^
       This system is monitored. Unauthorized access is prohibited.
     ^
    end
    write memory
fixtures:
  positive: fixtures/l2_banner_login.compliant.txt
  negative: fixtures/l2_banner_login.violating.txt
