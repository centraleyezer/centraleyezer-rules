id: cisco.ios.cis-l2.1.1.14
title: "L2: Password minimum length must be ≥ 14"
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  `security passwords min-length 14` (or stricter) must be set
  so locally-created accounts reject passwords shorter than
  14 chars. L1 minimum is 8; L2 raises to 14.
rationale: |
  14 chars is the NIST 800-63B floor for the long-tail of
  brute-force-resistant memorable passwords against offline
  hash cracking on modern GPUs.
impact: |
  Local accounts can use weaker, brute-forceable passwords.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — L2 1.1.14"
  nist: ["IA-5"]
  cwe: [521]
query:
  path: "$.passwords.min_length"
  in: [14, 16, 18, 20, 24, 32]
on_fail:
  message: "Password minimum length is below 14."
  remediation_cli: |
    configure terminal
     security passwords min-length 14
    end
    write memory
fixtures:
  positive: fixtures/l2_pw_minlen.compliant.txt
  negative: fixtures/l2_pw_minlen.violating.txt
