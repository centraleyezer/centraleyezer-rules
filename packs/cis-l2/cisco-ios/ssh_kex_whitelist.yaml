id: cisco.ios.cis-l2.3.6.12
title: "L2: SSH key-exchange must be ECDH / Curve25519 only (no DH groups)"
severity: high
vendors: [cisco-ios, cisco-ios-xe]
description: |
  Every algorithm in `ip ssh server algorithm kex` must be on
  the elliptic-curve allow-list: `ecdh-sha2-nistp256/384/521`
  or `curve25519-sha256`. Any `diffie-hellman-group*` entry
  is a failure, regardless of group number.
rationale: |
  L1 allows DH-group-14-sha1 as a fallback. L2 says no DH at
  all: ECDH is faster, smaller, and lacks the
  Logjam-class precomputation risk. Modern clients all
  support ECDH.
impact: |
  DH-group key exchange acceptable; precomputation /
  Logjam-class attacks remain in scope.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — L2 3.6.12"
  nist: ["SC-13"]
  cwe: [327]
query:
  path: "$.crypto.ssh_kex[*]"
  in: ["ecdh-sha2-nistp256", "ecdh-sha2-nistp384", "ecdh-sha2-nistp521", "curve25519-sha256", "curve25519-sha256@libssh.org"]
on_fail:
  message: "SSH key-exchange list contains entries outside the ECDH/Curve25519 allow-list."
  remediation_cli: |
    configure terminal
     ip ssh server algorithm kex ecdh-sha2-nistp521 ecdh-sha2-nistp384 ecdh-sha2-nistp256
    end
    write memory
fixtures:
  positive: fixtures/l2_ssh_kex.compliant.txt
  negative: fixtures/l2_ssh_kex.violating.txt
