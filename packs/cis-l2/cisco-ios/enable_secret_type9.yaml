id: cisco.ios.cis-l2.1.1.15
title: "L2: enable secret must be type-9 (scrypt)"
severity: medium
vendors: [cisco-ios, cisco-ios-xe]
description: |
  The enable secret must be stored as type-9 (scrypt). L1
  accepts type-8 (PBKDF2-SHA-256); L2 raises to type-9
  because scrypt is intentionally memory-hard and resists
  GPU brute-force better.
rationale: |
  Type-8 (PBKDF2-SHA-256) is fine on a normal CPU but
  parallelises onto GPU. Type-9 (scrypt) introduces a memory
  cost that makes per-GPU-second cracking much more
  expensive.
impact: |
  Enable secret is GPU-brute-forceable; faster offline
  recovery once a backup is captured.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — L2 1.1.15"
  nist: ["IA-5", "IA-7"]
  cwe: [916]
query:
  path: "$.passwords.encryption"
  equals: "type-9"
on_fail:
  message: "enable secret is not type-9 (scrypt)."
  remediation_cli: |
    configure terminal
     enable algorithm-type scrypt secret <NEW-STRONG-PASSWORD>
    end
    write memory
fixtures:
  positive: fixtures/l2_secret_type9.compliant.txt
  negative: fixtures/l2_secret_type9.violating.txt
