id: cisco.ios.cis-l2.3.6.14
title: "L2: `ip ssh authentication-retries` must be ≤ 2"
severity: low
vendors: [cisco-ios, cisco-ios-xe]
description: |
  `ip ssh authentication-retries <N>` must be ≤ 2 (L1 allows
  up to 3). Tightens per-session brute-force budget.
rationale: |
  Stricter L2 baseline. Each retry doubles the auth window for
  an attacker; capping at 2 (default modern OpenSSH server)
  is the contemporary norm.
impact: |
  Larger per-session auth budget; slightly easier
  online-brute-force.
references:
  cis: "CIS Cisco IOS 17 Benchmark v2.1.0 — L2 3.6.14"
  nist: ["AC-7", "AC-17"]
  cwe: [307]
query:
  path: "$.hardening.ssh_retries"
  in: [1, 2]
on_fail:
  message: "ip ssh authentication-retries is not set ≤ 2."
  remediation_cli: |
    configure terminal
     ip ssh authentication-retries 2
    end
    write memory
fixtures:
  positive: fixtures/l2_ssh_retries.compliant.txt
  negative: fixtures/l2_ssh_retries.violating.txt
