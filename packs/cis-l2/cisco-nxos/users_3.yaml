id: cisco.nxos.cis-l2.1.1.10
title: "L2: NX-OS must have ≥ 3 local users (primary + break-glass + audit)"
severity: low
vendors: [cisco-nx-os]
description: |
  At least 3 local `username` accounts must be defined.
  Sibling of the IOS L2 rule.
rationale: |
  L1 ≥ 2 (break-glass). L2 ≥ 3 to support a separate
  network-operator (read-only) account for routine
  monitoring, so the network-admin accounts aren't used
  for tasks they shouldn't need to be.
impact: |
  Privileged accounts used for read-only monitoring; weaker
  role-separation.
references:
  cis: "CIS Cisco NX-OS Benchmark — L2 1.1.10"
  nist: ["AC-2", "AC-6"]
  cwe: []
query:
  path: "$.hardening.nxos_user_count"
  in: [3, 4, 5, 6, 7, 8, 9, 10]
on_fail:
  message: "Fewer than 3 local NX-OS user accounts are defined."
  remediation_cli: |
    configure terminal
     username netzer-admin     password <X> role network-admin
     username netzer-emergency password <Y> role network-admin
     username netzer-monitor   password <Z> role network-operator
    end
    copy running-config startup-config
fixtures:
  positive: fixtures/l2_users3.compliant.txt
  negative: fixtures/l2_users3.violating.txt
