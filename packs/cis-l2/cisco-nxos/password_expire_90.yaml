id: cisco.nxos.cis-l2.1.2.9
title: "L2: NX-OS `password expire-days` must be ≤ 90"
severity: low
vendors: [cisco-nx-os]
description: |
  `password expire-days <N>` must be ≤ 90 (L1 was ≤ 365).
  Tighter rotation cadence for local NX-OS accounts.
rationale: |
  Local NX-OS account hashes leak via every config backup.
  90-day rotation is the standard enterprise cadence;
  365-day L1 baseline is the minimum legal/audit floor.
impact: |
  Local-password compromise window up to a year before
  rotation forces a refresh.
references:
  cis: "CIS Cisco NX-OS Benchmark — L2 1.2.9"
  nist: ["IA-5"]
  cwe: [262]
query:
  path: "$.hardening.nxos_password_expire_days"
  in: [30, 45, 60, 75, 90]
on_fail:
  message: "password expire-days is not set ≤ 90."
  remediation_cli: |
    configure terminal
     password expire-days 90
    end
    copy running-config startup-config
fixtures:
  positive: fixtures/l2_pw_expire.compliant.txt
  negative: fixtures/l2_pw_expire.violating.txt
