id: cisco.nxos.cis-l2.1.2.10
title: "L2: NX-OS `password expire-days` must be ≤ 60"
severity: low
vendors: [cisco-nx-os]
description: |
  `password expire-days <N>` must be ≤ 60 (L2-round-1 was
  ≤ 90, L1 was ≤ 365). Strictest rotation cadence in the L2
  set.
rationale: |
  60-day cadence matches the enterprise privileged-account
  norm; 90-day was the historical PCI baseline now widely
  superseded.
impact: |
  Longer per-credential exposure window between forced
  rotations.
references:
  cis: "CIS Cisco NX-OS Benchmark — L2 1.2.10"
  nist: ["IA-5"]
  cwe: [262]
query:
  path: "$.hardening.nxos_password_expire_days"
  in: [15, 30, 45, 60]
on_fail:
  message: "password expire-days is not ≤ 60."
  remediation_cli: |
    configure terminal
     password expire-days 60
    end
    copy running-config startup-config
fixtures:
  positive: fixtures/l2_expire60.compliant.txt
  negative: fixtures/l2_expire60.violating.txt
