# NIST 800-53 Rev 5 control mapping overlay.
#
# Each entry maps a Netzer rule id to one or more 800-53 controls.
# The evaluator stamps these controls onto the finding's references.nist
# field. Adding a new rule? Append an entry here so federal / regulated
# customers see the control mapping in their reports.
#
# Control families used:
#   AC — Access Control
#   AU — Audit and Accountability
#   CM — Configuration Management
#   IA — Identification and Authentication
#   SC — System and Communications Protection
#   SI — System and Information Integrity

