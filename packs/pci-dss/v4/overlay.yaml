# PCI-DSS v4.0 requirement mapping overlay.
#
# Each entry maps a Netzer rule id to one or more PCI-DSS v4.0 sub-requirements.
# The mapping is applied at finding-emit time, stamping references.pci_dss
# onto every finding so reports group cleanly by PCI requirement.
#
# Mapping methodology — automatic topic classification on rule id + title:
#   SSH / telnet / crypto      → 2.2.7 (secure config), 4.2.1 (PAN crypto in transit), 8.5.1 (auth crypto)
#   SNMP                       → 2.2.7, 4.2.1, 10.4.1
#   logging / syslog / audit   → 10.2.1–10.7
#   NTP / clock                → 10.6.1–10.6.3
#   AAA / password / login     → 7.2, 8.2, 8.3
#   VTY ACL / management plane → 1.4, 7.2
#   service hardening          → 2.2.4, 2.2.7
#   routing / L2 protection    → 1.2, 1.3, 2.2
#   inspection / threat detect → 1.4, 11.5
#   PSIRT CVE                  → 6.3, 11.3 (patch / vuln mgmt)
#
# Bulk-generated. Hand-edit individual entries that need a finer-grained
# requirement (e.g. promote a rule to 4.2.1.2 specifically) but keep the
# bulk classifier in tools/.

