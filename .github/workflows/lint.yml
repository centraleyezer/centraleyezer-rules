name: lint

on:
  pull_request:
    paths:
      - 'packs/**'
      - 'feed/**'
      - '.github/workflows/lint.yml'
  push:
    branches: [main]

jobs:
  yaml-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML syntax (every file under packs/ and feed/)
        run: |
          set -e
          python3 -c "
          import sys, glob, yaml
          ok = True
          for p in glob.glob('packs/**/*.yaml', recursive=True) + \
                   glob.glob('packs/**/*.yml',  recursive=True) + \
                   glob.glob('feed/**/*.json',  recursive=True):
              try:
                  with open(p) as f:
                      if p.endswith('.json'):
                          import json; json.load(f)
                      else:
                          yaml.safe_load(f)
              except Exception as e:
                  print(f'PARSE FAIL  {p}  {e}'); ok = False
          sys.exit(0 if ok else 1)
          "

  duplicate-ids:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect duplicate rule IDs across packs/
        run: |
          set -e
          if [ ! -d packs ]; then exit 0; fi
          # Extract id: lines from every rule file, count duplicates.
          dups=$(find packs -name '*.yaml' -exec grep -H '^id:' {} \; \
                 | awk -F'[: ]+' '{print $NF}' \
                 | sort | uniq -d)
          if [ -n "$dups" ]; then
            echo "Duplicate rule IDs found:"
            echo "$dups"
            exit 1
          fi
