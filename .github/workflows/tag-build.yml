# .github/workflows/tag-build.yml
#
# Drop this file into centraleyezer/centraleyezer-rules under
# .github/workflows/ to wire the rule-pack release pipeline.
#
# On every tag matching "netzer-<pack>-v<version>" (e.g.
# "netzer-cisco-v1.0.0") this workflow:
#   1. Checks out the rules repo at the tag.
#   2. Downloads the centraleyezer-packager static binary from the
#      latest centraleyezer-rules-platform CI build (Harbor mirror).
#   3. Runs packager → tarball + MANIFEST.json.
#   4. Creates a GitHub Release in DRAFT state with the tarball attached.
#   5. POSTs the release metadata to the editor-api ingest endpoint so
#      the operator sees it in the Releases tab and can sign + publish.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   CER_PLATFORM_HOST       e.g. crs.centraleyezer.io
#   CER_CI_INGEST_TOKEN     matches CER_CI_INGEST_TOKEN on the platform side

name: tag-build

on:
  push:
    tags:
      - "netzer-*-v*"
      - "eyezer-*-v*"

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse tag (product / pack / version)
        id: parse
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # netzer-cisco-v1.0.0 → product=netzer pack=cisco version=1.0.0
          product="${tag%%-*}"; rest="${tag#${product}-}"
          version="${rest##*-v}"; pack="${rest%-v${version}}"
          echo "tag=${tag}"          >> "$GITHUB_OUTPUT"
          echo "product=${product}"  >> "$GITHUB_OUTPUT"
          echo "pack=${pack}"        >> "$GITHUB_OUTPUT"
          echo "version=${version}"  >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build packager
        run: |
          # Clone the platform repo (public read OR use a deploy key).
          # Pinned commit is preferable in production — bump deliberately.
          git clone --depth 1 https://github.com/centraleyezer/centraleyezer-rules-platform.git /tmp/platform || \
            git clone --depth 1 https://git.centraleyezer.io/sandline/centraleyezer-rules-platform.git /tmp/platform
          (cd /tmp/platform && go build -o /tmp/packager ./cmd/packager)

      - name: Pack
        id: pack
        run: |
          mkdir -p artifacts
          /tmp/packager \
            --rules    "${{ github.workspace }}" \
            --product  "${{ steps.parse.outputs.product }}" \
            --pack     "${{ steps.parse.outputs.pack }}" \
            --version  "${{ steps.parse.outputs.version }}" \
            --git-sha  "${{ github.sha }}" \
            --out      "artifacts/${{ steps.parse.outputs.product }}-${{ steps.parse.outputs.pack }}-rules-${{ steps.parse.outputs.version }}.tar.gz" \
            --json     > artifacts/packager-result.json
          cat artifacts/packager-result.json
          echo "sha256=$(jq -r .tarball_sha256 artifacts/packager-result.json)" >> "$GITHUB_OUTPUT"
          echo "rules=$(jq -r .rule_count artifacts/packager-result.json)"      >> "$GITHUB_OUTPUT"

      - name: Create draft Release + upload tarball
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar="artifacts/${{ steps.parse.outputs.product }}-${{ steps.parse.outputs.pack }}-rules-${{ steps.parse.outputs.version }}.tar.gz"
          # `gh release create` is idempotent if you delete first.
          gh release delete "${{ steps.parse.outputs.tag }}" --yes 2>/dev/null || true
          gh release create "${{ steps.parse.outputs.tag }}" "$tar" \
            --draft \
            --title "${{ steps.parse.outputs.product }} ${{ steps.parse.outputs.pack }} rules ${{ steps.parse.outputs.version }}" \
            --notes "sha256: ${{ steps.pack.outputs.sha256 }}"
          asset_url=$(gh api "repos/${{ github.repository }}/releases/tags/${{ steps.parse.outputs.tag }}" --jq '.assets[] | select(.name | endswith(".tar.gz")) | .url')
          echo "asset_url=${asset_url}" >> "$GITHUB_OUTPUT"

      - name: Notify editor-api ingest
        env:
          CER_HOST: ${{ secrets.CER_PLATFORM_HOST }}
          CER_TOKEN: ${{ secrets.CER_CI_INGEST_TOKEN }}
        run: |
          # Extract MANIFEST.json out of the tarball for the ingest payload.
          tar="artifacts/${{ steps.parse.outputs.product }}-${{ steps.parse.outputs.pack }}-rules-${{ steps.parse.outputs.version }}.tar.gz"
          manifest=$(tar -xOzf "$tar" MANIFEST.json | jq -c .)
          payload=$(jq -nc \
            --arg product "${{ steps.parse.outputs.product }}" \
            --arg pack    "${{ steps.parse.outputs.pack }}" \
            --arg version "${{ steps.parse.outputs.version }}" \
            --arg channel "stable" \
            --arg sha     "${{ steps.pack.outputs.sha256 }}" \
            --argjson rules ${{ steps.pack.outputs.rules }} \
            --arg url     "${{ steps.release.outputs.asset_url }}" \
            --arg tag     "${{ steps.parse.outputs.tag }}" \
            --arg sha2    "${{ github.sha }}" \
            --argjson manifest "$manifest" \
            '{product:$product, pack:$pack, channel:$channel, version:$version, rule_count:$rules, sha256:$sha, bundle_url:$url, manifest_json:$manifest, git_tag:$tag, git_sha:$sha2}')
          curl -fsS -X POST \
            -H "Authorization: Bearer ${CER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${payload}" \
            "https://${CER_HOST}/api/v1/releases/ingest"
